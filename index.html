<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKSHINN Project</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Serif+KR:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:rgba(255,255,255,0.72);
  --bg2:rgba(220,235,255,0.55);
  --text:#1a2a4a;
  --text2:#3a5080;
  --text3:#7090b8;
  --border:rgba(80,130,200,0.12);
  --border2:rgba(80,130,200,0.22);
  --accent:#3a5a8a;
  --radius:3px;
  --radius-lg:5px;
  --red:#e24b4a;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;color:var(--text);position:relative;overflow-x:hidden;letter-spacing:-0.04em}
#bg-canvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}
.page{display:none;position:relative;z-index:1}
.page.active{display:block}

/* 히어로 */
.hero-wrap{display:flex;flex-direction:column;min-height:100vh}
.hero-nav-bar{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:0.5px solid var(--border2)}
.hero-nav-logo{font-family:'Playfair Display',Georgia,serif;font-size:12px;font-weight:700;letter-spacing:-0.03em;color:var(--text)}
.hero-nav-right{font-size:14px;color:var(--text3);background:none;border:none;cursor:pointer}
.hero-nav-right:hover{color:var(--text2)}
.hero-center{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 28px 32px}
.hero-main-title{font-family:'Playfair Display',Georgia,serif;font-size:clamp(40px,7vw,88px);font-weight:700;letter-spacing:-0.06em;color:#1a2a4a;line-height:1.0;cursor:pointer;margin-bottom:20px}
.hero-main-title:hover{opacity:0.7}
.hero-main-sub1{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:14px;color:#3a5080;letter-spacing:0.02em;line-height:1.8;margin-bottom:4px}
.hero-main-sub2{font-family:'Playfair Display',Georgia,serif;font-size:12px;color:#7090b8;letter-spacing:0.04em}
.hero-groups-row{position:relative;z-index:2;display:flex;gap:24px;padding:20px 28px;justify-content:center;flex-wrap:wrap;border-top:0.5px solid var(--border)}
.hero-bottom-bar{position:relative;z-index:2;padding:10px 28px;border-top:0.5px solid var(--border)}
.hero-group-item,.hero-bottom-postype{font-family:'Cormorant Garamond',Georgia,serif !important}
.hero-group-item{font-size:11px;letter-spacing:-0.05em;color:#3a5080}
.hero-bottom-postype{font-size:9px;letter-spacing:-0.03em;color:#7090b8;text-transform:uppercase}

/* 트럼프 카드 인덱스 */
.group-grid-wrap{display:block;max-width:865px;margin:0 auto;width:100%;padding:2rem 1.25rem;min-height:100vh}
.group-grid{display:flex;flex-direction:row;gap:10px;width:100%;margin-bottom:1.5rem;justify-content:center;flex-wrap:nowrap}
.group-card{width:165px;height:243px;border-radius:8px;background:#eef3fa;border:0.5px solid rgba(80,130,200,0.22);box-shadow:0 4px 16px rgba(40,80,160,0.1),0 1px 4px rgba(40,80,160,0.07);position:relative;cursor:pointer;transition:transform .15s;display:flex;flex-direction:column;padding:8px 9px}
.group-card:hover{transform:translateY(-4px)}
.group-card-top{display:flex;align-items:baseline;gap:2px}
.group-card-abbr{font-family:'Noto Serif KR',Georgia,serif;font-size:13px;font-weight:700;letter-spacing:-0.05em;color:#1a2a4a}
.group-card-suit{font-size:11px;color:#1a2a4a;margin-left:2px}
.group-card-center{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.group-card-suit-big{font-size:44px;line-height:1;color:rgba(26,42,74,0.1)}
.group-card-name{font-family:'Noto Serif KR',Georgia,serif;font-size:20px;letter-spacing:-0.05em;color:#7090b8;text-transform:uppercase;margin-top:4px}
.group-card-sub{font-family:'Noto Serif KR',Georgia,serif;font-size:15px;color:#aabbcc;letter-spacing:-0.04em;margin-top:2px}
.group-card-bottom{display:flex;justify-content:flex-end}
.group-card-suit-bot{font-size:11px;color:#1a2a4a;transform:rotate(180deg);display:inline-block}
.edit-entry{text-align:right;width:100%}
.edit-entry button{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer}

/* 뒤로가기 */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:1.5rem;padding:4px 0;background:none;border:none;letter-spacing:-0.04em}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* 상세 페이지 */
.group-wrap{max-width:865px;margin:0 auto;padding:2rem 1.25rem;letter-spacing:-0.05em}
.group-page-header{margin-bottom:1.25rem;display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
.group-page-title{font-family:'Noto Serif KR',Georgia,serif;font-size:20px;font-weight:700;letter-spacing:-0.05em;color:var(--text)}
.group-page-count{font-size:13px;color:var(--text3)}
.toolbar{margin-bottom:1rem;display:flex;flex-direction:column;gap:10px}
.toolbar-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar-label{font-size:12px;color:var(--text3);white-space:nowrap}
.sort-toggle{font-size:12px;padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:rgba(255,255,255,0.5);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;min-width:80px;justify-content:space-between}
.sort-toggle:hover{background:rgba(255,255,255,0.8)}
.sort-arrow{font-size:10px;transition:transform .2s}
.sort-arrow.asc{transform:rotate(180deg)}
.cp-tag{font-size:12px;padding:5px 10px;border-radius:0;border:none;background:rgba(200,220,255,0.3);color:var(--text2);cursor:pointer;transition:background .15s;letter-spacing:-0.04em}
.cp-tag:hover{background:rgba(200,220,255,0.55)}
.cp-tag.active{background:var(--accent);color:#fff}
.table-wrap{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);border:0.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{border-bottom:0.5px solid var(--border2)}
th{font-size:11px;font-weight:500;color:var(--text3);padding:10px 12px;text-align:left;background:rgba(210,228,255,0.3);letter-spacing:-0.03em}
td{font-size:13px;padding:10px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;color:var(--text);letter-spacing:-0.05em}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.45)}
col.col-no{width:36px}col.col-date{width:86px}col.col-title{width:auto}col.col-genre{width:38%}
.no{color:var(--text3);font-size:12px}
.date-cell{font-size:12px;color:var(--text3);white-space:nowrap}
.title-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.title-text{font-size:13px;font-weight:500;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.title-text:hover{opacity:0.7}
.adult-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.collab-badge{font-size:10px;padding:2px 7px;border-radius:2px;background:rgba(180,210,255,0.3);border:0.5px solid rgba(100,150,230,0.3);color:var(--text2);white-space:nowrap;letter-spacing:0}
.genre-cell{font-size:12px;color:var(--text2)}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(50,80,150,0.2);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal-bg.hidden{display:none}
.modal{background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);border-radius:var(--radius-lg);padding:2rem;width:320px;max-width:90vw;border:0.5px solid var(--border2)}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--text)}
.modal input{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:rgba(255,255,255,0.8);color:var(--text);font-size:14px;outline:none;margin-bottom:8px}
.modal input:focus{border-color:var(--accent)}
.modal-err{font-size:12px;color:var(--red);min-height:16px;margin-bottom:8px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn{font-size:13px;padding:7px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:rgba(255,255,255,0.6);color:var(--text);cursor:pointer;letter-spacing:-0.04em}
.btn:hover{background:rgba(255,255,255,0.9)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:var(--red);border-color:rgba(226,75,74,0.3)}
.btn.danger:hover{background:rgba(226,75,74,0.08)}

/* 본문 페이지 */
.prose-page-wrap{max-width:865px;margin:0 auto;padding:2rem 1.25rem;letter-spacing:-0.05em}
.prose-page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:12px;flex-wrap:wrap}
.prose-page-title{font-family:'Noto Serif KR',Georgia,serif;font-size:20px;font-weight:700;letter-spacing:-0.05em;color:var(--text)}
.prose-page-meta{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:-0.03em}
.prose-view{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;min-height:200px;font-size:14px;line-height:2;color:var(--text);font-family:'MapoGoldenPier','Noto Serif KR',Georgia,serif}
.prose-view p{margin-bottom:1em}
.prose-view h1{font-size:1.4em;font-weight:700;margin:1.2em 0 0.5em}
.prose-view h2{font-size:1.2em;font-weight:700;margin:1em 0 0.4em}
.prose-view h3{font-size:1.05em;font-weight:700;margin:.8em 0 .3em}
.prose-view em{font-style:italic}
.prose-view strong{font-weight:700}
.prose-view hr{border:none;border-top:0.5px solid var(--border2);margin:1.5em 0}
.prose-view blockquote{border-left:2px solid var(--border2);padding-left:1em;color:var(--text2);margin:1em 0}
.prose-view-empty{color:var(--text3);font-style:italic;font-size:13px}
.prose-edit-area{width:100%;min-height:400px;padding:1.5rem;border:0.5px solid var(--border2);border-radius:var(--radius-lg);background:rgba(255,255,255,0.6);color:var(--text);font-size:14px;line-height:2;resize:vertical;outline:none;font-family:'MapoGoldenPier','Noto Serif KR',Georgia,serif;letter-spacing:-0.1em}
.prose-edit-area:focus{border-color:var(--accent)}
.prose-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.prose-tool-btn{font-size:12px;padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:rgba(255,255,255,0.6);color:var(--text2);cursor:pointer}
.prose-tool-btn:hover{background:rgba(255,255,255,0.9)}
.prose-mode-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:rgba(255,255,255,0.5);color:var(--text2);cursor:pointer}
.prose-mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* 에디터 */
.editor-wrap{max-width:865px;margin:0 auto;padding:2rem 1.25rem;letter-spacing:-0.05em}
.editor-header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.editor-header h2{font-size:18px;font-weight:500;flex:1;color:var(--text)}
.logout-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer}
.work-form{background:rgba(255,255,255,0.55);backdrop-filter:blur(10px);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem}
.work-form h3{font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;color:var(--text3)}
.form-field input,.form-field select{padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:rgba(255,255,255,0.7);color:var(--text);font-size:13px;outline:none}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.cp-combo{position:relative}
.cp-combo input{width:100%}
.cp-dropdown{position:absolute;top:100%;left:0;right:0;background:rgba(255,255,255,0.97);border:0.5px solid var(--border2);border-radius:var(--radius);z-index:10;max-height:160px;overflow-y:auto;display:none}
.cp-dropdown.show{display:block}
.cp-option{padding:7px 10px;font-size:13px;cursor:pointer}
.cp-option:hover{background:rgba(210,228,255,0.4)}
.form-checks{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.form-checks label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.form-actions{display:flex;gap:8px;justify-content:flex-end}
.prose-selector{display:flex;gap:8px;margin-bottom:0.75rem;align-items:center;flex-wrap:wrap}
.prose-selector select{font-size:13px;padding:6px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:rgba(255,255,255,0.6);color:var(--text);outline:none;flex:1;max-width:300px}
.prose-area{width:100%;min-height:400px;padding:14px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);background:rgba(255,255,255,0.6);color:var(--text);font-size:14px;line-height:1.8;resize:vertical;outline:none;font-family:inherit;letter-spacing:-0.05em}
.prose-area:focus{border-color:var(--accent)}
.prose-save-row{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;align-items:center}
.prose-saved{font-size:12px;color:var(--text3)}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  col.col-date,th.col-date,td.col-date{display:none}
  .group-grid{flex-direction:column;align-items:center;flex-wrap:wrap}
  .group-card{width:100%;max-width:320px;height:auto;flex-direction:row;gap:16px;justify-content:flex-start;padding:14px 16px}
  .group-card-center{flex-direction:row;gap:10px;justify-content:flex-start;align-items:center}
  .group-card-suit-big{font-size:28px}
  .group-card-bottom{display:none}
}
@font-face{font-family:"MapoGoldenPier";src:url("https://raw.githubusercontent.com/nainn-a/pokshinn/main/MapoGoldenPier.otf") format("opentype");font-weight:normal;font-style:normal}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- 모달 -->
<div class="modal-bg hidden" id="pw-modal">
  <div class="modal">
    <h2 id="pw-modal-title">에디터 잠금 해제</h2>
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <div class="modal-err" id="pw-err"></div>
    <div class="modal-btns">
      <button class="btn" id="pw-cancel">취소</button>
      <button class="btn primary" id="pw-confirm">확인</button>
    </div>
  </div>
</div>

<!-- 히어로 -->
<div class="page active" id="page-home">
  <div class="hero-wrap">
    <div class="hero-nav-bar">
      <div class="hero-nav-logo">POKSHINN Project</div>
      <button class="hero-nav-right" onclick="requirePw('editor')">✎</button>
    </div>
    <div class="hero-center">
      <div class="hero-main-title" id="hero-title-btn">POKSHINN Project</div>
      <div class="hero-main-sub1">nainn fanfiction archive</div>
      <div class="hero-main-sub2">2021 - ongoing</div>
    </div>
    <div class="hero-groups-row" id="hero-groups"></div>
    <div class="hero-bottom-bar">
      <div class="hero-bottom-postype">based on Postype</div>
    </div>
  </div>
</div>

<!-- 인덱스 -->
<div class="page" id="page-cards">
  <div class="group-grid-wrap">
    <button class="back-btn" id="back-to-hero">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>홈으로
    </button>
    <div class="group-grid" id="group-grid"></div>
    <div class="edit-entry"><button onclick="requirePw('editor')">✎ 편집</button></div>
  </div>
</div>

<!-- 상세 -->
<div class="page" id="page-group">
  <div class="group-wrap">
    <button class="back-btn" id="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>목록으로
    </button>
    <div class="group-page-header">
      <div>
        <span class="group-page-title" id="gp-title"></span>
        <span class="group-page-count" id="gp-count" style="margin-left:8px"></span>
      </div>
      <button class="btn" onclick="openNewProse()">+ 글 추가</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-row">
        <button class="sort-toggle" id="sort-toggle-btn">
          <span id="sort-label">최신순</span>
          <span class="sort-arrow" id="sort-arrow">↓</span>
        </button>
      </div>
      <div class="toolbar-row" id="cp-tags"></div>
    </div>
    <div class="table-wrap">
      <table>
        <colgroup><col class="col-no"><col class="col-date"><col class="col-title"><col class="col-genre"></colgroup>
        <thead><tr><th>#</th><th class="col-date">작성일</th><th>제목</th><th>장르</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 본문 뷰어/에디터 -->
<div class="page" id="page-prose">
  <div class="prose-page-wrap">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap">
      <button class="back-btn" id="back-to-group">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>목록으로
      </button>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <span class="prose-saved" id="prose-page-saved"></span>
        <button class="btn" onclick="downloadSingleProse()">↓ TXT</button>
        <button class="prose-mode-btn" id="prose-edit-btn">편집</button>
        <button class="btn primary" id="prose-page-save-btn" style="display:none" onclick="saveProseContent()">저장</button>
      </div>
    </div>
    <div class="prose-page-header">
      <div>
        <div class="prose-page-title" id="prose-page-title"></div>
        <div class="prose-page-meta" id="prose-page-meta"></div>
      </div>
    </div>
    <!-- 보기 -->
    <div id="prose-view-mode">
      <div class="prose-view" id="prose-rendered"></div>
    </div>
    <!-- 편집 -->
    <div id="prose-edit-mode" style="display:none">
      <div class="prose-toolbar">
        <button class="prose-tool-btn" onclick="execCmd('bold')"><b>B</b></button>
        <button class="prose-tool-btn" onclick="execCmd('italic')"><i>I</i></button>
        <button class="prose-tool-btn" onclick="insertHr()">—</button>
        <span style="width:0.5px;height:18px;background:var(--border2);display:inline-block;margin:0 4px;vertical-align:middle"></span>
        <button class="prose-tool-btn" style="color:#c0392b;font-weight:700" onclick="applyColorCE('#c0392b')">A</button>
        <button class="prose-tool-btn" style="color:#2c5fa8;font-weight:700" onclick="applyColorCE('#2c5fa8')">A</button>
        <button class="prose-tool-btn" style="color:#888;font-weight:700" onclick="applyColorCE('#888888')">A</button>
        <input type="color" id="prose-color-pick" value="#e24b4a" title="다른 색" style="width:26px;height:26px;padding:1px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;vertical-align:middle" oninput="applyColorCE(this.value)">
      </div>
      <div class="prose-edit-area" id="prose-page-area" contenteditable="true" spellcheck="false" style="font-family:'MapoGoldenPier','Noto Serif KR',serif;letter-spacing:-0.1em;min-height:400px;padding:1.5rem;line-height:2.1;font-size:15px"></div>
    </div>
  </div>
</div>

<!-- 에디터 -->
<div class="page" id="page-editor">
  <div class="editor-wrap">
    <button class="back-btn" id="back-from-editor">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>이전으로
    </button>
    <div class="editor-header">
      <h2>에디터</h2>
      <button class="logout-btn" onclick="logout()">잠금</button>
    </div>

    <!-- 작품 선택 -->
    <div style="margin-bottom:1rem">
      <div class="prose-selector">
        <select id="editor-work-sel" onchange="onEditorWorkChange()">

function drawBg(){
  const c=document.getElementById("bg-canvas");
  const W=window.innerWidth,H=window.innerHeight;
  c.width=W;c.height=H;c.style.width=W+"px";c.style.height=H+"px";
  const ctx=c.getContext("2d");
  ctx.fillStyle="#ddeeff";ctx.fillRect(0,0,W,H);
  function blob(x,y,rx,ry,r,g,b,a){
    ctx.save();ctx.translate(x,y);ctx.scale(1,ry/rx);
    const gr=ctx.createRadialGradient(0,0,0,0,0,rx);
    gr.addColorStop(0,`rgba(${r},${g},${b},${a})`);
    gr.addColorStop(0.3,`rgba(${r},${g},${b},${a*.65})`);
    gr.addColorStop(0.65,`rgba(${r},${g},${b},${a*.2})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,rx,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  blob(W*.88,H*-.05,W*.55,H*.55,140,200,255,.75);
  blob(W*.95,H*.1,W*.35,H*.4,180,220,255,.65);
  blob(W*.55,H*-.1,W*.4,H*.45,220,238,255,.8);
  blob(W*.4,H*.45,W*.5,H*.5,160,185,240,.5);
  blob(W*.6,H*.55,W*.45,H*.45,130,170,235,.45);
  blob(W*.1,H*.85,W*.45,H*.5,100,155,230,.55);
  blob(W*.25,H*1.0,W*.5,H*.55,120,175,245,.6);
  blob(W*.5,H*.95,W*.55,H*.5,150,200,255,.55);
  blob(W*.5,H*1.05,W*.4,H*.4,200,225,255,.5);
  blob(W*.82,H*.9,W*.38,H*.45,110,165,235,.5);
  blob(W*.08,H*.4,W*.22,H*.28,120,180,250,.38);
  const wh=ctx.createLinearGradient(0,0,W,H);
  wh.addColorStop(0,"rgba(255,255,255,0.22)");wh.addColorStop(.5,"rgba(255,255,255,0.08)");wh.addColorStop(1,"rgba(255,255,255,0.18)");
  ctx.fillStyle=wh;ctx.fillRect(0,0,W,H);
  const vig=ctx.createRadialGradient(W/2,H/2,H*.05,W/2,H/2,W*.75);
  vig.addColorStop(0,"rgba(200,220,255,0)");vig.addColorStop(.6,"rgba(150,185,230,0.05)");vig.addColorStop(1,"rgba(100,145,210,0.18)");
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
}

async function sha256(msg){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

}

document.getElementById("pw-confirm").onclick=async()=>{
  const val=document.getElementById("pw-input").value;
  const h=await sha256(val);
  if(pwPurpose==='dl'){
    const stored=localStorage.getItem("archive_dlhash");
    const target=stored||(await sha256("theo71"));
    if(!stored)localStorage.setItem("archive_dlhash",target);
    if(h===target){document.getElementById("pw-modal").classList.add("hidden");downloadTxt();}
    else document.getElementById("pw-err").textContent="비밀번호가 틀렸습니다.";
    return;
  }
  const stored=localStorage.getItem("archive_pwhash");
  const target=stored||(await sha256("7690"));
  if(!stored)localStorage.setItem("archive_pwhash",target);
  if(h===target){
    document.getElementById("pw-modal").classList.add("hidden");
    unlocked=true;
    if(pwPurpose==='prose-new'){openProseEditorNew();}
    else if(pwPurpose==='prose-edit'){setProseMode("edit");}
    else{openEditor();}
  }else{
    document.getElementById("pw-err").textContent="비밀번호가 틀렸습니다.";
  }
};

function renderMarkdown(md){
  if(!md||!md.trim()){
    document.getElementById("prose-rendered").innerHTML=`<span class="prose-view-empty">아직 작성된 본문이 없어요.</span>`;
    return;
  }
  // span 태그 보존을 위해 먼저 추출
  const spans=[];
  let safe=md.replace(/<span([^>]*)>([\s\S]*?)<\/span>/g,(m)=>{spans.push(m);return`\x00${spans.length-1}\x00`;});
  let h=safe
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/^---$/gm,"<hr>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/\n\n/g,"</p><p>")
    .replace(/\n/g,"<br>");
  // span 복원
  h=h.replace(/\x00(\d+)\x00/g,(_,i)=>spans[+i]);
  document.getElementById("prose-rendered").innerHTML=`<p>${h}</p>`;
}
function setProseMode(mode){

  document.getElementById("prose-edit-btn").classList.toggle("active",isEdit);
  if(!isEdit)renderMarkdown(document.getElementById("prose-page-area").value);
}

  document.getElementById("prose-page-meta").textContent=`${w.group} · ${w.cp}${w.date?" · "+w.date:""}`;
  const stored=localStorage.getItem(getProseKey(id))||"";
  document.getElementById("prose-page-area").value=stored;
  renderMarkdown(stored);
  setProseMode("view");
  showPage("page-prose");
}
function openNewProse(){
  if(!unlocked){requirePw('prose-new');return;}
  openProseEditorNew();
}
function openProseEditorNew(){
  openEditor();
  resetEditorForm();
}
function saveProseContent(){
  if(!currentProseId)return;
  localStorage.setItem(getProseKey(currentProseId),document.getElementById("prose-page-area").value);
  renderMarkdown(document.getElementById("prose-page-area").value);
  const s=document.getElementById("prose-page-saved");
  s.textContent="저장됨 "+new Date().toLocaleTimeString();
  setTimeout(()=>{s.textContent=""},3000);
}
document.getElementById("prose-edit-btn").onclick=()=>{
  if(!unlocked){requirePw('prose-edit');return;}
  setProseMode("edit");
};
document.getElementById("back-to-group").onclick=()=>showPage("page-group");

/* ── contenteditable 유틸 ── */
function execCmd(cmd){document.execCommand(cmd,false,null);}
function execEditorCmd(cmd){document.execCommand(cmd,false,null);}
function applyColorCE(color){document.execCommand('foreColor',false,color);}
function applyEditorColor(color){document.execCommand('foreColor',false,color);}
function insertHr(){document.execCommand('insertHTML',false,'<hr>');}
function insertEditorHr(){document.execCommand('insertHTML',false,'<hr>');}

function getProseHTML(id){return document.getElementById(id).innerHTML;}
function setProseHTML(id,html){document.getElementById(id).innerHTML=html||'';}

function applyColor(taId,color){
  const ta=document.getElementById(taId);
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);if(!sel)return;
  const tag=`<span style="color:${color}">${sel}</span>`;
  ta.value=ta.value.substring(0,s)+tag+ta.value.substring(e);
  ta.focus();
}

function insertMd(before,after){
  const ta=document.getElementById("prose-page-area");
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.focus();ta.selectionStart=s+before.length;ta.selectionEnd=s+before.length+sel.length;
}

/* ── 에디터 ── */
function openEditor(){
  showPage("page-editor");
  renderEditorWorkSel();
}
function renderEditorWorkSel(){
  const sel=document.getElementById("editor-work-sel");
  const cur=sel.value;
  sel.innerHTML='<option value="">— 새 작품 추가 —</option>';
  [...DATA].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).forEach(w=>{
    const o=document.createElement("option");o.value=w.id;o.textContent=`[${w.group}] ${w.title}`;sel.appendChild(o);
  });
  if(cur)sel.value=cur;
}
function onEditorWorkChange(){
  const id=document.getElementById("editor-work-sel").value;
  if(!id){resetEditorForm();return;}
  const w=DATA.find(x=>x.id==id);if(!w)return;
  editingId=w.id;
  document.getElementById("form-title").textContent="작품 수정";
  document.getElementById("form-cancel-btn").style.display="";
  document.getElementById("editor-del-work-btn").style.display="";
  document.getElementById("f-title").value=w.title;
  document.getElementById("f-group").value=w.group;
  document.getElementById("f-cp").value=w.cp;
  document.getElementById("f-date").value=w.date||"";
  document.getElementById("f-genre").value=w.genre||"";
  document.getElementById("f-collabname").value=w.collabName||"";
  document.getElementById("f-adult").checked=w.adult;
  document.getElementById("f-collab").checked=w.collab;
  document.getElementById("prose-area").value=localStorage.getItem(getProseKey(w.id))||"";
}
function resetEditorForm(){
  editingId=null;
  document.getElementById("form-title").textContent="새 작품 추가";
  document.getElementById("form-cancel-btn").style.display="none";
  document.getElementById("editor-del-work-btn").style.display="none";
  document.getElementById("editor-work-sel").value="";
  ["f-title","f-cp","f-date","f-genre","f-collabname"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-group").value="ONEUS";
  document.getElementById("f-adult").checked=false;
  document.getElementById("f-collab").checked=false;
  document.getElementById("prose-area").value="";
}
document.getElementById("form-cancel-btn").onclick=resetEditorForm;
function deleteCurrentWork(){
  if(!editingId||!confirm("이 작품을 삭제할까요?"))return;
  DATA=DATA.filter(w=>w.id!==editingId);
  saveStorage();renderHome();renderEditorWorkSel();resetEditorForm();
}
function submitForm(){
  const title=document.getElementById("f-title").value.trim();
  const cp=document.getElementById("f-cp").value.trim();
  if(!title||!cp){alert("제목과 CP는 필수입니다.");return;}
  const obj={
    id:editingId||nextId++,title,
    group:document.getElementById("f-group").value,cp,
    date:document.getElementById("f-date").value,
    genre:document.getElementById("f-genre").value.trim(),
    adult:document.getElementById("f-adult").checked,
    collab:document.getElementById("f-collab").checked,
    collabName:document.getElementById("f-collabname").value.trim()
  };
  if(editingId)DATA=DATA.map(w=>w.id===editingId?obj:w);else DATA.push(obj);
  saveStorage();renderHome();renderEditorWorkSel();
  editingId=obj.id;
  document.getElementById("editor-work-sel").value=obj.id;
  document.getElementById("form-title").textContent="작품 수정";
  document.getElementById("form-cancel-btn").style.display="";
  document.getElementById("editor-del-work-btn").style.display="";
}
function saveProse(){
  const id=editingId;
  if(!id){alert("먼저 작품을 저장하거나 선택하세요.");return;}
  localStorage.setItem(getProseKey(id),document.getElementById("prose-area").value);
  const s=document.getElementById("prose-saved");
  s.textContent="저장됨 "+new Date().toLocaleTimeString();
  setTimeout(()=>{s.textContent=""},3000);
}
function insertEditorMd(before,after){
  const ta=document.getElementById("prose-area");
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.focus();ta.selectionStart=s+before.length;ta.selectionEnd=s+before.length+sel.length;
}

/* ── CP 드롭다운 ── */
function getCpsForGroup(g){return[...new Set(DATA.filter(w=>w.group===g).map(w=>w.cp))].filter(Boolean);}
function updateCpDropdown(){document.getElementById("f-cp").value="";renderCpOptions("");}
function renderCpOptions(q){
  const cps=getCpsForGroup(document.getElementById("f-group").value);
  const filtered=q?cps.filter(c=>c.toLowerCase().includes(q.toLowerCase())):cps;
  const dd=document.getElementById("cp-dropdown");dd.innerHTML="";
  if(!filtered.length){dd.classList.remove("show");return;}
  filtered.forEach(cp=>{const d=document.createElement("div");d.className="cp-option";d.textContent=cp;d.onmousedown=()=>{document.getElementById("f-cp").value=cp;dd.classList.remove("show");};dd.appendChild(d);});
  dd.classList.add("show");
}
function filterCpDropdown(){renderCpOptions(document.getElementById("f-cp").value);}
function showCpDropdown(){renderCpOptions(document.getElementById("f-cp").value);}
function hideCpDropdown(){setTimeout(()=>document.getElementById("cp-dropdown").classList.remove("show"),150);}

/* ── 초기화 ── */
loadStorage();
renderHome();
</script>
</body>
</html>
